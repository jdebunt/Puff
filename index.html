<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Puff - Morning Breathwork</title>
  <meta name="theme-color" content="#1a2e25" />
  <meta name="description" content="Your mindful breathing companion. Start each day with intention before the world rushes in." />
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  
  <!-- Apple PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Puff" />
  <link rel="apple-touch-icon" href="/icons/puff-192.png" />
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/icons/puff-192.png" />
  
  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  
  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('SW registered:', registration.scope)
          })
          .catch(error => {
            console.log('SW registration failed:', error)
          })
      })
    }
  </script>
</body>
</html>
