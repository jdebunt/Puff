<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puff Mascot - Export</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    h1 {
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    .variants {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .variant {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      text-align: center;
    }
    .variant h3 {
      margin: 20px 0 10px;
      color: #374151;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .variant.large {
      padding: 40px;
    }
    .variant.large svg {
      width: 512px;
      height: 435px;
    }
  </style>
</head>
<body>
  <h1>🌤️ Puff Mascot Export</h1>
  <p style="color: white; opacity: 0.9;">Right-click each Puff → "Save Image As..." or screenshot</p>
  
  <div class="variants">
    <!-- Focus Theme (Blue) - Large for icons -->
    <div class="variant large">
      <svg viewBox="0 0 200 170" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="puffGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="#7dd3fc"/>
            <stop offset="50%" stopColor="#38bdf8"/>
            <stop offset="100%" stopColor="#0ea5e9"/>
          </linearGradient>
          <radialGradient id="cheekGradient">
            <stop offset="0%" stopColor="#fda4af" stopOpacity="0.9"/>
            <stop offset="100%" stopColor="#fda4af" stopOpacity="0"/>
          </radialGradient>
        </defs>
        <g>
          <ellipse cx="60" cy="90" rx="35" ry="30" fill="#0284c7" opacity="0.85"/>
          <ellipse cx="140" cy="90" rx="35" ry="30" fill="#0284c7" opacity="0.85"/>
          <ellipse cx="100" cy="70" rx="40" ry="35" fill="#0ea5e9" opacity="0.8"/>
          <ellipse cx="50" cy="85" rx="40" ry="35" fill="url(#puffGradient)"/>
          <ellipse cx="150" cy="85" rx="40" ry="35" fill="url(#puffGradient)"/>
          <ellipse cx="100" cy="60" rx="50" ry="45" fill="url(#puffGradient)"/>
          <ellipse cx="100" cy="95" rx="45" ry="35" fill="url(#puffGradient)"/>
          <ellipse cx="100" cy="50" rx="30" ry="20" fill="#bae6fd" opacity="0.6"/>
          <ellipse cx="65" cy="95" rx="14" ry="9" fill="url(#cheekGradient)"/>
          <ellipse cx="135" cy="95" rx="14" ry="9" fill="url(#cheekGradient)"/>
          <ellipse cx="75" cy="80" rx="7" ry="8" fill="white"/>
          <ellipse cx="125" cy="80" rx="7" ry="8" fill="white"/>
          <circle cx="75" cy="80" r="4" fill="#0f172a"/>
          <circle cx="76" cy="78" r="1.5" fill="white"/>
          <circle cx="125" cy="80" r="4" fill="#0f172a"/>
          <circle cx="126" cy="78" r="1.5" fill="white"/>
          <circle cx="80" cy="74" r="2.5" fill="#fef08a"/>
          <circle cx="120" cy="74" r="2.5" fill="#fef08a"/>
          <path d="M 92 106 Q 100 115 108 106" stroke="#fb7185" stroke-width="3.5" fill="none" stroke-linecap="round"/>
          <path d="M 45 95 Q 28 102 22 88" stroke="#38bdf8" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9"/>
          <path d="M 155 95 Q 172 102 178 88" stroke="#38bdf8" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9"/>
          <circle cx="30" cy="50" r="5" fill="#fde047" opacity="0.8"/>
          <circle cx="170" cy="60" r="4" fill="#fde047" opacity="0.8"/>
          <circle cx="100" cy="25" r="6" fill="#fde047" opacity="0.7"/>
          <circle cx="20" cy="100" r="4" fill="#a7f3d0" opacity="0.7"/>
          <circle cx="180" cy="110" r="5" fill="#a7f3d0" opacity="0.7"/>
          <circle cx="50" cy="30" r="3" fill="#fbbf24" opacity="0.6"/>
          <circle cx="150" cy="35" r="3" fill="#fbbf24" opacity="0.6"/>
        </g>
      </svg>
      <h3>Focus (Blue) - 512px</h3>
    </div>

    <!-- Relaxation Theme (Purple) -->
    <div class="variant">
      <svg viewBox="0 0 200 170" xmlns="http://www.w3.org/2000/svg" width="256" height="218">
        <defs>
          <linearGradient id="puffGradientRelax" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="#d8b4fe"/>
            <stop offset="50%" stopColor="#c084fc"/>
            <stop offset="100%" stopColor="#a855f7"/>
          </linearGradient>
          <radialGradient id="cheekGradientRelax">
            <stop offset="0%" stopColor="#fda4af" stopOpacity="0.9"/>
            <stop offset="100%" stopColor="#fda4af" stopOpacity="0"/>
          </radialGradient>
        </defs>
        <g>
          <ellipse cx="60" cy="90" rx="35" ry="30" fill="#9333ea" opacity="0.85"/>
          <ellipse cx="140" cy="90" rx="35" ry="30" fill="#9333ea" opacity="0.85"/>
          <ellipse cx="100" cy="70" rx="40" ry="35" fill="#a855f7" opacity="0.8"/>
          <ellipse cx="50" cy="85" rx="40" ry="35" fill="url(#puffGradientRelax)"/>
          <ellipse cx="150" cy="85" rx="40" ry="35" fill="url(#puffGradientRelax)"/>
          <ellipse cx="100" cy="60" rx="50" ry="45" fill="url(#puffGradientRelax)"/>
          <ellipse cx="100" cy="95" rx="45" ry="35" fill="url(#puffGradientRelax)"/>
          <ellipse cx="100" cy="50" rx="30" ry="20" fill="#e9d5ff" opacity="0.6"/>
          <ellipse cx="65" cy="95" rx="14" ry="9" fill="url(#cheekGradientRelax)"/>
          <ellipse cx="135" cy="95" rx="14" ry="9" fill="url(#cheekGradientRelax)"/>
          <ellipse cx="75" cy="80" rx="7" ry="8" fill="white"/>
          <ellipse cx="125" cy="80" rx="7" ry="8" fill="white"/>
          <circle cx="75" cy="80" r="4" fill="#0f172a"/>
          <circle cx="76" cy="78" r="1.5" fill="white"/>
          <circle cx="125" cy="80" r="4" fill="#0f172a"/>
          <circle cx="126" cy="78" r="1.5" fill="white"/>
          <circle cx="80" cy="74" r="2.5" fill="#fef08a"/>
          <circle cx="120" cy="74" r="2.5" fill="#fef08a"/>
          <path d="M 92 106 Q 100 115 108 106" stroke="#fb7185" stroke-width="3.5" fill="none" stroke-linecap="round"/>
          <path d="M 45 95 Q 28 102 22 88" stroke="#c084fc" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9"/>
          <path d="M 155 95 Q 172 102 178 88" stroke="#c084fc" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9"/>
          <circle cx="30" cy="50" r="5" fill="#fde047" opacity="0.8"/>
          <circle cx="170" cy="60" r="4" fill="#fde047" opacity="0.8"/>
          <circle cx="100" cy="25" r="6" fill="#fde047" opacity="0.7"/>
          <circle cx="20" cy="100" r="4" fill="#a7f3d0" opacity="0.7"/>
          <circle cx="180" cy="110" r="5" fill="#a7f3d0" opacity="0.7"/>
        </g>
      </svg>
      <h3>Relaxation (Purple)</h3>
    </div>

    <!-- Activation Theme (Yellow/Orange) -->
    <div class="variant">
      <svg viewBox="0 0 200 170" xmlns="http://www.w3.org/2000/svg" width="256" height="218">
        <defs>
          <linearGradient id="puffGradientActive" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="#fde047"/>
            <stop offset="50%" stopColor="#facc15"/>
            <stop offset="100%" stopColor="#eab308"/>
          </linearGradient>
          <radialGradient id="cheekGradientActive">
            <stop offset="0%" stopColor="#fda4af" stopOpacity="0.9"/>
            <stop offset="100%" stopColor="#fda4af" stopOpacity="0"/>
          </radialGradient>
        </defs>
        <g>
          <ellipse cx="60" cy="90" rx="35" ry="30" fill="#ca8a04" opacity="0.85"/>
          <ellipse cx="140" cy="90" rx="35" ry="30" fill="#ca8a04" opacity="0.85"/>
          <ellipse cx="100" cy="70" rx="40" ry="35" fill="#eab308" opacity="0.8"/>
          <ellipse cx="50" cy="85" rx="40" ry="35" fill="url(#puffGradientActive)"/>
          <ellipse cx="150" cy="85" rx="40" ry="35" fill="url(#puffGradientActive)"/>
          <ellipse cx="100" cy="60" rx="50" ry="45" fill="url(#puffGradientActive)"/>
          <ellipse cx="100" cy="95" rx="45" ry="35" fill="url(#puffGradientActive)"/>
          <ellipse cx="100" cy="50" rx="30" ry="20" fill="#fef08a" opacity="0.6"/>
          <ellipse cx="65" cy="95" rx="14" ry="9" fill="url(#cheekGradientActive)"/>
          <ellipse cx="135" cy="95" rx="14" ry="9" fill="url(#cheekGradientActive)"/>
          <ellipse cx="75" cy="80" rx="7" ry="8" fill="white"/>
          <ellipse cx="125" cy="80" rx="7" ry="8" fill="white"/>
          <circle cx="75" cy="80" r="4" fill="#0f172a"/>
          <circle cx="76" cy="78" r="1.5" fill="white"/>
          <circle cx="125" cy="80" r="4" fill="#0f172a"/>
          <circle cx="126" cy="78" r="1.5" fill="white"/>
          <circle cx="80" cy="74" r="2.5" fill="#fef08a"/>
          <circle cx="120" cy="74" r="2.5" fill="#fef08a"/>
          <path d="M 92 106 Q 100 115 108 106" stroke="#fb7185" stroke-width="3.5" fill="none" stroke-linecap="round"/>
          <path d="M 45 95 Q 28 102 22 88" stroke="#eab308" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9"/>
          <path d="M 155 95 Q 172 102 178 88" stroke="#eab308" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.9"/>
          <circle cx="30" cy="50" r="5" fill="#fde047" opacity="0.8"/>
          <circle cx="170" cy="60" r="4" fill="#fde047" opacity="0.8"/>
          <circle cx="100" cy="25" r="6" fill="#fde047" opacity="0.7"/>
          <circle cx="20" cy="100" r="4" fill="#a7f3d0" opacity="0.7"/>
          <circle cx="180" cy="110" r="5" fill="#a7f3d0" opacity="0.7"/>
        </g>
      </svg>
      <h3>Activation (Yellow)</h3>
    </div>
  </div>

  <p style="color: white; opacity: 0.8; margin-top: 20px;">
    💡 <strong>Tip:</strong> Right-click on any Puff above → "Save Image As..." to get a PNG with preserved colors
  </p>
</body>
</html>
