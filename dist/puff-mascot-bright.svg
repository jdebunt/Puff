<svg viewBox="0 0 200 170" xmlns="http://www.w3.org/2000/svg" width="400" height="340">
  <defs>
    <!-- Bright gradient for body - vibrant sky blue to soft cyan -->
    <linearGradient id="puffGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#7dd3fc" />
      <stop offset="50%" stopColor="#38bdf8" />
      <stop offset="100%" stopColor="#0ea5e9" />
    </linearGradient>

    <!-- Gradient for cheeks - warm pink -->
    <radialGradient id="cheekGradient">
      <stop offset="0%" stopColor="#fda4af" stopOpacity="0.9" />
      <stop offset="100%" stopColor="#fda4af" stopOpacity="0" />
    </radialGradient>

    <!-- Soft glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Extra glow for sparkle effect -->
    <filter id="sparkleGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Main cloud body - composed of multiple circles for fluffy look -->
  <g>
    <!-- Back puffs - slightly darker for depth -->
    <ellipse cx="60" cy="90" rx="35" ry="30" fill="#0284c7" opacity="0.85" />
    <ellipse cx="140" cy="90" rx="35" ry="30" fill="#0284c7" opacity="0.85" />
    <ellipse cx="100" cy="70" rx="40" ry="35" fill="#0ea5e9" opacity="0.8" />

    <!-- Main body - bright and vibrant -->
    <ellipse cx="50" cy="85" rx="40" ry="35" fill="url(#puffGradient)" filter="url(#glow)" />
    <ellipse cx="150" cy="85" rx="40" ry="35" fill="url(#puffGradient)" filter="url(#glow)" />
    <ellipse cx="100" cy="60" rx="50" ry="45" fill="url(#puffGradient)" filter="url(#glow)" />
    <ellipse cx="100" cy="95" rx="45" ry="35" fill="url(#puffGradient)" filter="url(#glow)" />

    <!-- Highlight on top for extra brightness -->
    <ellipse cx="100" cy="50" rx="30" ry="20" fill="#bae6fd" opacity="0.6" />

    <!-- Cheeks - warm and rosy -->
    <ellipse cx="65" cy="95" rx="14" ry="9" fill="url(#cheekGradient)" />
    <ellipse cx="135" cy="95" rx="14" ry="9" fill="url(#cheekGradient)" />

    <!-- Eyes - big and expressive -->
    <g>
      <!-- Left eye white -->
      <ellipse cx="75" cy="80" rx="7" ry="8" fill="white" />
      <!-- Right eye white -->
      <ellipse cx="125" cy="80" rx="7" ry="8" fill="white" />

      <!-- Left pupil - dark with shine -->
      <circle cx="75" cy="80" r="4" fill="#0f172a" />
      <circle cx="76" cy="78" r="1.5" fill="white" />
      
      <!-- Right pupil - dark with shine -->
      <circle cx="125" cy="80" r="4" fill="#0f172a" />
      <circle cx="126" cy="78" r="1.5" fill="white" />

      <!-- Eye sparkles -->
      <circle cx="80" cy="74" r="2.5" fill="#fef08a" filter="url(#sparkleGlow)" />
      <circle cx="120" cy="74" r="2.5" fill="#fef08a" filter="url(#sparkleGlow)" />
    </g>

    <!-- Mouth - happy smile -->
    <path d="M 92 106 Q 100 115 108 106" stroke="#fb7185" strokeWidth="3.5" fill="none" strokeLinecap="round" />

    <!-- Little arms - friendly and welcoming -->
    <path d="M 45 95 Q 28 102 22 88" stroke="#38bdf8" strokeWidth="8" fill="none" strokeLinecap="round" opacity="0.9" />
    <path d="M 155 95 Q 172 102 178 88" stroke="#38bdf8" strokeWidth="8" fill="none" strokeLinecap="round" opacity="0.9" />

    <!-- Floating sparkles around Puff - magical and bright -->
    <circle cx="30" cy="50" r="5" fill="#fde047" filter="url(#sparkleGlow)" opacity="0.8" />
    <circle cx="170" cy="60" r="4" fill="#fde047" filter="url(#sparkleGlow)" opacity="0.8" />
    <circle cx="100" cy="25" r="6" fill="#fde047" filter="url(#sparkleGlow)" opacity="0.7" />
    <circle cx="20" cy="100" r="4" fill="#a7f3d0" filter="url(#sparkleGlow)" opacity="0.7" />
    <circle cx="180" cy="110" r="5" fill="#a7f3d0" filter="url(#sparkleGlow)" opacity="0.7" />
    <circle cx="50" cy="30" r="3" fill="#fbbf24" filter="url(#sparkleGlow)" opacity="0.6" />
    <circle cx="150" cy="35" r="3" fill="#fbbf24" filter="url(#sparkleGlow)" opacity="0.6" />
  </g>
</svg>
