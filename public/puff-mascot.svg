<svg viewBox="0 0 200 170" xmlns="http://www.w3.org/2000/svg" width="400" height="340">
  <defs>
    <!-- Gradient for body (Focus theme - blue) -->
    <linearGradient id="puffGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#93c5fd" />
      <stop offset="100%" stopColor="#60a5fa" />
    </linearGradient>

    <!-- Gradient for cheeks -->
    <radialGradient id="cheekGradient">
      <stop offset="0%" stopColor="#fca5a5" stopOpacity="0.8" />
      <stop offset="100%" stopColor="#fca5a5" stopOpacity="0" />
    </radialGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Main cloud body - composed of multiple circles for fluffy look -->
  <g>
    <!-- Back puffs -->
    <ellipse cx="60" cy="90" rx="35" ry="30" fill="#60a5fa" opacity="0.9" />
    <ellipse cx="140" cy="90" rx="35" ry="30" fill="#60a5fa" opacity="0.9" />
    <ellipse cx="100" cy="70" rx="40" ry="35" fill="#60a5fa" opacity="0.8" />

    <!-- Main body -->
    <ellipse cx="50" cy="85" rx="40" ry="35" fill="url(#puffGradient)" filter="url(#glow)" />
    <ellipse cx="150" cy="85" rx="40" ry="35" fill="url(#puffGradient)" filter="url(#glow)" />
    <ellipse cx="100" cy="60" rx="50" ry="45" fill="url(#puffGradient)" filter="url(#glow)" />
    <ellipse cx="100" cy="95" rx="45" ry="35" fill="url(#puffGradient)" filter="url(#glow)" />

    <!-- Cheeks -->
    <ellipse cx="65" cy="95" rx="12" ry="8" fill="url(#cheekGradient)" />
    <ellipse cx="135" cy="95" rx="12" ry="8" fill="url(#cheekGradient)" />

    <!-- Eyes -->
    <g>
      <!-- Left eye white -->
      <ellipse cx="75" cy="80" rx="6" ry="7" fill="white" />
      <!-- Right eye white -->
      <ellipse cx="125" cy="80" rx="6" ry="7" fill="white" />

      <!-- Left pupil -->
      <circle cx="75" cy="80" r="3" fill="#1e293b" />
      <!-- Right pupil -->
      <circle cx="125" cy="80" r="3" fill="#1e293b" />

      <!-- Eye sparkles -->
      <circle cx="78" cy="76" r="3" fill="white" opacity="0.9" />
      <circle cx="128" cy="76" r="3" fill="white" opacity="0.9" />
    </g>

    <!-- Mouth - gentle smile (idle/happy expression) -->
    <path d="M 95 108 Q 100 112 105 108" stroke="#fca5a5" strokeWidth="3" fill="none" strokeLinecap="round" />

    <!-- Little arms -->
    <path d="M 45 95 Q 30 100 25 90" stroke="#60a5fa" strokeWidth="8" fill="none" strokeLinecap="round" opacity="0.8" />
    <path d="M 155 95 Q 170 100 175 90" stroke="#60a5fa" strokeWidth="8" fill="none" strokeLinecap="round" opacity="0.8" />

    <!-- Floating sparkles around Puff -->
    <circle cx="30" cy="50" r="4" fill="#93c5fd" opacity="0.6" />
    <circle cx="170" cy="60" r="3" fill="#93c5fd" opacity="0.6" />
    <circle cx="100" cy="25" r="5" fill="#93c5fd" opacity="0.6" />
    <circle cx="20" cy="100" r="3" fill="#60a5fa" opacity="0.5" />
    <circle cx="180" cy="110" r="4" fill="#60a5fa" opacity="0.5" />
  </g>
</svg>
